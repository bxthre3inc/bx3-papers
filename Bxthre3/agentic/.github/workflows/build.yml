name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_target:
        description: 'Build target'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - binary
          - docker
          - test
          - android
          - ios
      rust_version:
        description: 'Rust version'
        required: false
        default: 'stable'
        type: choice
        options:
          - stable
          - nightly
          - '1.75'
          - '1.85'

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Security audit
  # ─────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Audit dependencies
        run: cargo audit

  # ─────────────────────────────────────────────
  # JOB 2: Test (runs in parallel with security)
  # ─────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust_version || 'stable' }}
          components: llvm-tools-preview

      - name: Cache cargo index
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run tests
        run: cargo test --all-features --workspace

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/llvm-cov/html/
          retention-days: 14

  # ─────────────────────────────────────────────
  # JOB 3: Build binary (triggers on PR merge + manual)
  # ─────────────────────────────────────────────
  build:
    name: Build Binary
    needs: [security, test]
    if: inputs.build_target == 'all' || inputs.build_target == 'binary' || inputs.build_target == ''
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-gnu
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust_version || 'stable' }}
          targets: ${{ matrix.target.target }}

      - name: Cache cargo index
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: |
          cargo build --release \
            --target ${{ matrix.target.target }} \
            --package agentic-core

      - name: Package
        run: |
          mkdir -p artifacts/${{ matrix.target.target }}
          cp target/${{ matrix.target.target }}/release/agentic-core \
             artifacts/${{ matrix.target.target }}/
          tar -czf agentic-${{ matrix.target.target }}.tar.gz \
             -C artifacts/${{ matrix.target.target }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentic-binary-${{ matrix.target.target }}
          path: agentic-${{ matrix.target.target }}.tar.gz
          retention-days: 30

  # ─────────────────────────────────────────────
  # JOB 4: Build Docker image (triggered separately)
  # ─────────────────────────────────────────────
  docker:
    name: Build Docker
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' ||
        github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 4b: Build Android binary (cross-compile Rust)
  # ─────────────────────────────────────────────
  android:
    name: Build Android
    needs: [security, test]
    if: inputs.build_target == 'all' || inputs.build_target == 'android'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust_version || 'stable' }}

      - name: Setup Android NDK
        run: |
          curl -sL https://dl.google.com/android/repository/android-ndk-r26b-linux.zip -o /tmp/ndk.zip
          unzip -q /tmp/ndk.zip -d /opt
          echo "NDK_HOME=/opt/android-ndk-r26b" >> $GITHUB_ENV
          echo "PATH=$PATH:/opt/android-ndk-r26b/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_ENV

      - name: Add Android targets
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android

      - name: Build release
        env:
          ANDROID_NDK_HOME: /opt/android-ndk-r26b
          TARGET_CC_aarch64_linux_android: $NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android30-clang
          TARGET_CC_armv7_linux_androideabi: $NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi30-clang
        run: |
          cargo build --release --package agentic-core \
            --target aarch64-linux-android --manifest-path src/core/Cargo.toml 2>/dev/null || \
          cargo build --release --package agentic-core

      - name: Package APK contents
        run: |
          mkdir -p artifacts/android
          for target in aarch64 armv7 x86_64; do
            bin="target/${target}-linux-android/release/agentic-core"
            if [ -f "$bin" ]; then
              cp "$bin" "artifacts/android/agentic-${target}"
              tar -czf "agentic-${target}.tar.gz" -C artifacts/android "agentic-${target}"
            fi
          done

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agentic-android
          path: agentic-*.tar.gz
          retention-days: 30

  # ─────────────────────────────────────────────
  # JOB 4c: Build iOS framework (cross-compile Rust)
  # ─────────────────────────────────────────────
  ios:
    name: Build iOS
    needs: [security, test]
    if: inputs.build_target == 'all' || inputs.build_target == 'ios'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust_version || 'stable' }}

      - name: Add iOS targets
        run: |
          rustup target add aarch64-apple-ios x86_64-apple-ios

      - name: Install cargo-lipo
        run: cargo install cargo-lipo

      - name: Build iOS framework
        run: |
          cargo lipo --release --package agentic-core 2>/dev/null || \
          cargo build --release --package agentic-core \
            --target aarch64-apple-ios

      - name: Package iOS framework
        run: |
          mkdir -p artifacts/ios
          cp target/aarch64-apple-ios/release/libagentic.a artifacts/ios/ 2>/dev/null || \
          cp target/aarch64-apple-ios/release/*.a artifacts/ios/ 2>/dev/null || true
          tar -czf agentic-ios.tar.gz -C artifacts/ios .

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agentic-ios
          path: agentic-ios.tar.gz
          retention-days: 30

  # ─────────────────────────────────────────────
  # JOB 5: Publish release (on tag push)
  # ─────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create checksums
        run: |
          cd artifacts
          for dir in */; do
            (cd "$dir" && sha256sum * > SHA256SUMS)
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.sha256
